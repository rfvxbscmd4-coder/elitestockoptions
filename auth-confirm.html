<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Confirm Reset - ELITESTOCKOPTIONS</title>
  <link rel="icon" type="image/png" href="/public/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/public/js/supabase-config.js"></script>
  <script src="/public/js/supabase-client.js"></script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4 text-slate-900">
  <main class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-200 p-8 text-center">
    <img src="/public/logo.png" alt="ELITESTOCKOPTIONS" class="w-16 h-16 object-contain mx-auto mb-5">
    <h1 class="text-2xl font-bold mb-3">Confirming Reset Link</h1>
    <p id="confirmMessage" class="text-sm text-slate-600">Please wait while we verify your password reset link.</p>
    <div class="mt-6">
      <a href="/pages/login.html" class="text-sm font-medium text-indigo-600 hover:text-indigo-700">Back to Sign In</a>
    </div>
  </main>

  <script>
    async function initAuthConfirm() {
      const messageEl = document.getElementById('confirmMessage');
      if (!(window.ESO_DB && window.ESO_DB.isReady())) {
        messageEl.textContent = 'Supabase is not configured on this page.';
        return;
      }

      const params = new URLSearchParams(window.location.search || '');
      const tokenHash = params.get('token_hash');
      const type = params.get('type') || 'recovery';
      const redirectTo = params.get('redirect_to') || `${window.location.origin}/reset-password.html`;

      if (!tokenHash) {
        messageEl.textContent = 'This confirmation link is missing its token. Request a fresh reset email.';
        return;
      }

      const verified = await window.ESO_DB.verifyOtpTokenHash(tokenHash, type);
      if (!verified) {
        const lastError = window.ESO_DB.getLastError ? window.ESO_DB.getLastError() : null;
        messageEl.textContent = lastError?.message || 'This reset link is invalid or expired. Request a new reset email.';
        return;
      }

      const target = new URL(redirectTo, window.location.origin);
      if (!target.searchParams.get('type')) {
        target.searchParams.set('type', 'recovery');
      }
      messageEl.textContent = 'Reset link confirmed. Redirecting...';
      window.location.replace(target.toString());
    }

    initAuthConfirm();
  </script>
</body>
</html>
