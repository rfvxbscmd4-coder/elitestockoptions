<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reset Password - ELITESTOCKOPTIONS</title>
  <link rel="icon" type="image/png" href="/public/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/public/js/supabase-config.js?v=20260403-01"></script>
  <script src="/public/js/supabase-client.js?v=20260403-01"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    html { -webkit-text-size-adjust: 100%; }
    .hero-glow {
      background:
        radial-gradient(circle at top left, rgba(79, 70, 229, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.16), transparent 30%),
        linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
    }
    .btn-primary {
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px -16px rgba(79, 70, 229, 0.8);
    }
    .input-field:focus {
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
  </style>
</head>
<body class="min-h-screen hero-glow text-gray-900">
  <main class="min-h-screen flex items-center justify-center p-4 sm:p-6">
    <section class="w-full max-w-md bg-white/95 backdrop-blur rounded-3xl shadow-2xl border border-white/70 p-6 sm:p-8">
      <div class="text-center mb-8">
        <img src="/public/logo.png" alt="ELITESTOCKOPTIONS" class="w-16 h-16 object-contain mx-auto mb-4">
        <h1 class="text-2xl font-bold">Set Your New Password</h1>
        <p id="resetIntro" class="text-sm text-gray-500 mt-2">Open the reset email link, then choose a new password here.</p>
      </div>

      <div id="resetAlert" class="hidden rounded-2xl px-4 py-3 text-sm mb-5"></div>

      <form id="resetPasswordForm" class="space-y-4 hidden" novalidate>
        <div>
          <label for="resetNewPassword" class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
          <input type="password" id="resetNewPassword" class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none" placeholder="Enter a new password" autocomplete="new-password">
        </div>
        <div>
          <label for="resetConfirmPassword" class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
          <input type="password" id="resetConfirmPassword" class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none" placeholder="Confirm your new password" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-primary w-full py-3 text-white rounded-xl font-semibold">
          Update Password <i class="fas fa-arrow-right ml-2"></i>
        </button>
      </form>

      <div id="resetFallback" class="hidden text-center space-y-4">
        <p class="text-sm text-gray-600">This reset link is missing, expired, or already used.</p>
        <a href="/pages/login.html" class="inline-flex items-center justify-center w-full border border-gray-200 rounded-xl py-3 font-medium text-gray-700 hover:bg-gray-50">
          Back to Sign In
        </a>
      </div>
    </section>
  </main>

  <script>
    function getRecoverySignal() {
      const hash = window.location.hash || '';
      const search = new URLSearchParams(window.location.search || '');
      return {
        hasRecovery: hash.includes('type=recovery')
          || hash.includes('access_token=')
          || search.get('type') === 'recovery'
          || search.has('token_hash')
          || search.has('code'),
        hash,
        search
      };
    }

    function setAlert(message, tone = 'info') {
      const alert = document.getElementById('resetAlert');
      const tones = {
        info: 'bg-indigo-50 text-indigo-700 border border-indigo-100',
        success: 'bg-emerald-50 text-emerald-700 border border-emerald-100',
        error: 'bg-red-50 text-red-700 border border-red-100'
      };

      alert.className = `${tones[tone] || tones.info} rounded-2xl px-4 py-3 text-sm mb-5`;
      alert.textContent = message;
      alert.classList.remove('hidden');
    }

    function showResetForm() {
      document.getElementById('resetPasswordForm').classList.remove('hidden');
      document.getElementById('resetFallback').classList.add('hidden');
    }

    function showFallback(message) {
      document.getElementById('resetPasswordForm').classList.add('hidden');
      document.getElementById('resetFallback').classList.remove('hidden');
      if (message) setAlert(message, 'error');
    }

    async function initResetPasswordPage() {
      if (!(window.ESO_DB && window.ESO_DB.isReady())) {
        showFallback('Password reset is not available because Supabase is not configured.');
        return;
      }

      const recovery = getRecoverySignal();
      if (!recovery.hasRecovery) {
        showFallback('This password reset link is not valid. Request a new reset email from the sign-in page.');
        return;
      }

      showResetForm();
      setAlert('Reset link detected. Enter your new password below.', 'info');
    }

    document.getElementById('resetPasswordForm').addEventListener('submit', async function (event) {
      event.preventDefault();

      const newPassword = document.getElementById('resetNewPassword').value;
      const confirmPassword = document.getElementById('resetConfirmPassword').value;

      if (newPassword.length < 6) {
        setAlert('Password must be at least 6 characters.', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        setAlert('Passwords do not match.', 'error');
        return;
      }

      const ok = await window.ESO_DB.updatePassword(newPassword);
      if (!ok) {
        const lastError = window.ESO_DB.getLastError ? window.ESO_DB.getLastError() : null;
        setAlert(lastError?.message || 'Unable to update password. Open a fresh reset email link and try again.', 'error');
        return;
      }

      setAlert('Password updated successfully. Redirecting to sign in...', 'success');
      window.history.replaceState({}, document.title, window.location.pathname);
      setTimeout(() => {
        window.location.href = '/pages/login.html';
      }, 1200);
    });

    initResetPasswordPage();
  </script>
<script src="/public/js/theme.js"></script>
</body>
</html>
