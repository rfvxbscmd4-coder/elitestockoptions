<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - ELITESTOCKOPTIONS</title>
  <link rel="icon" type="image/png" href="../public/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            secondary: '#7c3aed',
            accent: '#06b6d4'
          }
        }
      }
    }
  </script>
  <style>
    .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #06b6d4 100%); }
    .glass-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
    .input-field { transition: all 0.3s; }
    .input-field:focus { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(79,70,229,0.3); }
    .btn-primary { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); transition: all 0.3s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px -5px rgba(79,70,229,0.5); }
    .floating-shape { animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col lg:flex-row">
  <!-- Left Side - Branding -->
  <div class="hidden lg:flex lg:w-1/2 gradient-bg items-center justify-center relative overflow-hidden">
    <div class="absolute inset-0 overflow-hidden">
      <div class="floating-shape absolute top-10 left-10 w-32 h-32 bg-white/10 rounded-full blur-xl"></div>
      <div class="floating-shape absolute bottom-20 right-20 w-48 h-48 bg-white/10 rounded-full blur-xl" style="animation-delay: -2s;"></div>
    </div>
    <div class="relative z-10 text-center text-white px-12">
      <div class="mb-8">
        <div class="w-24 h-24 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
          <i class="fas fa-chart-line text-white text-4xl"></i>
        </div>
        <h1 class="text-4xl font-bold mb-4">ELITESTOCKOPTIONS</h1>
        <p class="text-xl text-white/80">Professional Trading Platform</p>
      </div>
    </div>
  </div>

  <!-- Right Side - Form -->
  <div class="flex-1 flex items-center justify-center p-4 sm:p-6 lg:p-8 min-h-screen">
    <div class="w-full max-w-md">
      <!-- Mobile Logo -->
      <div class="lg:hidden text-center mb-6">
        <div class="w-16 h-16 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-3">
          <i class="fas fa-chart-line text-white text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">ELITESTOCKOPTIONS</h1>
      </div>

      <div class="glass-card rounded-2xl shadow-xl p-5 sm:p-8">
        <div class="text-center mb-6">
          <h2 class="text-xl sm:text-2xl font-bold text-gray-900">Welcome Back</h2>
          <p class="text-gray-500 mt-2 text-sm sm:text-base">Sign in to your account</p>
        </div>

        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <div class="relative">
              <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="email" id="email" required 
                class="input-field w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 text-sm sm:text-base"
                placeholder="you@example.com">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <div class="relative">
              <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="password" id="password" required 
                class="input-field w-full pl-10 pr-12 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 text-sm sm:text-base"
                placeholder="Enter your password">
              <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                <i class="fas fa-eye" id="eye-icon"></i>
              </button>
            </div>
          </div>

          <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2">
            <label class="flex items-center">
              <input type="checkbox" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
              <span class="ml-2 text-sm text-gray-600">Remember me</span>
            </label>
            <a href="#" class="text-sm text-primary hover:underline">Forgot password?</a>
          </div>

          <button type="submit" class="btn-primary w-full py-3 text-white rounded-xl font-semibold text-base sm:text-lg">
            <i class="fas fa-sign-in-alt mr-2"></i>Sign In
          </button>
        </form>

        <p class="text-center mt-6 text-gray-600 text-sm sm:text-base">
          Don't have an account? 
          <a href="register.html" class="text-primary font-semibold hover:underline">Sign Up</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    function togglePassword() {
      const field = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        field.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const users = JSON.parse(localStorage.getItem('eso_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);
      
      if (user) {
        localStorage.setItem('elitestockoptions_user', JSON.stringify(user));
        window.location.href = 'dashboard.html';
      } else {
        alert('Invalid email or password!');
      }
    });
  </script>
</body>
</html>
