<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Withdrawal - ELITESTOCKOPTIONS</title>
  <link rel="icon" type="image/png" href="../public/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            secondary: '#7c3aed',
            accent: '#06b6d4'
          }
        }
      }
    }
  </script>
  <style>
    .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
    .sidebar-link { transition: all 0.3s; }
    .sidebar-link:hover, .sidebar-link.active { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; }
    .mobile-sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
    .mobile-sidebar.open { transform: translateX(0); }
    .overlay { opacity: 0; visibility: hidden; transition: all 0.3s; }
    .overlay.active { opacity: 1; visibility: visible; }
    @media (max-width: 1024px) {
      .main-content { margin-left: 0 !important; }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Mobile Overlay -->
  <div id="overlay" class="overlay fixed inset-0 bg-black/50 z-40 lg:hidden" onclick="closeSidebar()"></div>

  <!-- Mobile Sidebar -->
  <aside id="mobileSidebar" class="mobile-sidebar fixed inset-y-0 left-0 w-64 bg-white shadow-xl z-50 lg:hidden overflow-y-auto">
    <div class="p-4 border-b flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center">
          <i class="fas fa-chart-line text-white"></i>
        </div>
        <span class="font-bold text-lg">ELITESTOCK</span>
      </div>
      <button onclick="closeSidebar()" class="p-2 text-gray-500 hover:text-gray-700">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>
    <nav class="py-4">
      <a href="dashboard.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 mx-2 rounded-xl text-gray-600">
        <i class="fas fa-home w-5"></i><span>Dashboard</span>
      </a>
      <a href="deposit.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 mx-2 rounded-xl text-gray-600">
        <i class="fas fa-arrow-down w-5"></i><span>Deposit</span>
      </a>
      <a href="withdrawal.html" class="sidebar-link active flex items-center space-x-3 px-4 py-3 mx-2 rounded-xl">
        <i class="fas fa-arrow-up w-5"></i><span>Withdraw</span>
      </a>
      <a href="settings.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 mx-2 rounded-xl text-gray-600">
        <i class="fas fa-cog w-5"></i><span>Settings</span>
      </a>
    </nav>
    <div class="p-4 border-t">
      <button onclick="logout()" class="flex items-center space-x-3 px-4 py-3 w-full rounded-xl text-red-600 hover:bg-red-50">
        <i class="fas fa-sign-out-alt w-5"></i><span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Desktop Sidebar -->
  <aside class="w-64 bg-white shadow-xl hidden lg:flex flex-col fixed inset-y-0 left-0 z-30">
    <div class="p-6 border-b">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center">
          <i class="fas fa-chart-line text-white"></i>
        </div>
        <span class="font-bold text-lg">ELITESTOCK</span>
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto py-4">
      <a href="dashboard.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 mx-2 rounded-xl text-gray-600">
        <i class="fas fa-home w-5"></i><span>Dashboard</span>
      </a>
      <a href="deposit.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 mx-2 rounded-xl text-gray-600">
        <i class="fas fa-arrow-down w-5"></i><span>Deposit</span>
      </a>
      <a href="withdrawal.html" class="sidebar-link active flex items-center space-x-3 px-4 py-3 mx-2 rounded-xl">
        <i class="fas fa-arrow-up w-5"></i><span>Withdraw</span>
      </a>
      <a href="settings.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 mx-2 rounded-xl text-gray-600">
        <i class="fas fa-cog w-5"></i><span>Settings</span>
      </a>
    </nav>
    <div class="p-4 border-t">
      <button onclick="logout()" class="flex items-center space-x-3 px-4 py-3 w-full rounded-xl text-red-600 hover:bg-red-50">
        <i class="fas fa-sign-out-alt w-5"></i><span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content lg:ml-64 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-20">
      <div class="flex items-center justify-between px-4 py-4">
        <div class="flex items-center">
          <button onclick="openSidebar()" class="lg:hidden p-2 mr-3 text-gray-600 hover:text-gray-900">
            <i class="fas fa-bars text-xl"></i>
          </button>
          <div>
            <h1 class="text-xl lg:text-2xl font-bold text-gray-900">Withdrawal</h1>
            <p class="text-gray-500 text-sm hidden sm:block">Withdraw funds from your account</p>
          </div>
        </div>
      </div>
    </header>

    <div class="p-4 lg:p-6">
      <div class="max-w-2xl mx-auto">
        <!-- Balance Info -->
        <div class="bg-white rounded-2xl shadow-sm p-4 lg:p-6 mb-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-gray-500">Available Balance</p>
              <p class="text-2xl lg:text-3xl font-bold text-gray-900" id="availableBalance">$0.00</p>
            </div>
            <div class="w-12 h-12 lg:w-14 lg:h-14 bg-green-100 rounded-xl flex items-center justify-center">
              <i class="fas fa-wallet text-green-600 text-xl lg:text-2xl"></i>
            </div>
          </div>
        </div>

        <!-- Withdrawal Form -->
        <div class="bg-white rounded-2xl shadow-sm p-4 lg:p-6">
          <h2 class="text-lg font-bold text-gray-900 mb-6">Request Withdrawal</h2>
          <form id="withdrawalForm" class="space-y-4 lg:space-y-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Withdrawal Method</label>
              <select id="method" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-primary">
                <option value="">Select method...</option>
                <option value="btc">Bitcoin (BTC)</option>
                <option value="eth">Ethereum (ETH)</option>
                <option value="usdt">Tether (USDT)</option>
                <option value="bank">Bank Transfer</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Amount (USD)</label>
              <input type="number" id="amount" required min="10" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-primary" placeholder="Enter amount">
              <p class="text-xs text-gray-500 mt-1">Min: $10 | Max: $<span id="maxWithdraw">0</span></p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Wallet Address / Account</label>
              <input type="text" id="address" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-primary" placeholder="Enter your wallet address or bank account">
            </div>
            <button type="submit" class="gradient-bg w-full py-3 text-white rounded-xl font-semibold">
              <i class="fas fa-paper-plane mr-2"></i>Request Withdrawal
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script>
    let currentUser = JSON.parse(localStorage.getItem('elitestockoptions_user'));
    if (!currentUser) window.location.href = 'login.html';

    function openSidebar() {
      document.getElementById('mobileSidebar').classList.add('open');
      document.getElementById('overlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
      document.getElementById('mobileSidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    function initWithdrawal() {
      const allUsers = JSON.parse(localStorage.getItem('eso_users') || '[]');
      const serverUser = allUsers.find(u => u.id === currentUser.id);
      if (serverUser) {
        currentUser.balance = serverUser.balance || 0;
        currentUser.availableCash = serverUser.availableCash || 0;
      }

      document.getElementById('availableBalance').textContent = '$' + (currentUser.availableCash || 0).toFixed(2);
      document.getElementById('maxWithdraw').textContent = (currentUser.availableCash || 0).toFixed(2);
    }

    document.getElementById('withdrawalForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const amount = parseFloat(document.getElementById('amount').value);
      
      if (amount > (currentUser.availableCash || 0)) {
        alert('Insufficient balance!');
        return;
      }

      const withdrawal = {
        id: Date.now().toString(),
        userId: currentUser.id,
        method: document.getElementById('method').value,
        amount: amount,
        address: document.getElementById('address').value,
        status: 'pending',
        createdAt: new Date().toISOString()
      };

      let withdrawals = JSON.parse(localStorage.getItem('eso_withdrawals') || '[]');
      withdrawals.push(withdrawal);
      localStorage.setItem('eso_withdrawals', JSON.stringify(withdrawals));

      currentUser.availableCash -= amount;
      currentUser.balance -= amount;
      localStorage.setItem('elitestockoptions_user', JSON.stringify(currentUser));

      let users = JSON.parse(localStorage.getItem('eso_users') || '[]');
      const idx = users.findIndex(u => u.id === currentUser.id);
      if (idx >= 0) {
        users[idx].availableCash = currentUser.availableCash;
        users[idx].balance = currentUser.balance;
        localStorage.setItem('eso_users', JSON.stringify(users));
      }

      let transactions = JSON.parse(localStorage.getItem('eso_transactions') || '[]');
      transactions.unshift({
        id: Date.now().toString(),
        userId: currentUser.id,
        type: 'withdrawal',
        amount: -amount,
        description: 'Withdrawal request - Pending',
        date: new Date().toISOString(),
        status: 'pending'
      });
      localStorage.setItem('eso_transactions', JSON.stringify(transactions));

      alert('Withdrawal request submitted! Waiting for admin approval.');
      initWithdrawal();
      this.reset();
    });

    function logout() {
      localStorage.removeItem('elitestockoptions_user');
      window.location.href = '../index.html';
    }

    window.addEventListener('resize', function() {
      if (window.innerWidth >= 1024) closeSidebar();
    });

    initWithdrawal();
  </script>
</body>
</html>
